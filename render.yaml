services:
  - type: web
    name: head-office-reporting-api
    runtime: python
    plan: standard
    region: frankfurt
    buildCommand: pip install -r backend/requirements.txt
    preDeployCommand: cd backend && alembic upgrade head && python -m app.db.create_initial_admin
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: head-office-reporting-db
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: FRONTEND_URL
        value: https://head-office-reporting.onrender.com
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_ACCESS_TOKEN_EXPIRE_MINUTES
        value: "720"
      - key: UPLOAD_DIR
        value: /opt/render/project/src/backend/uploads
      - key: MAX_UPLOAD_SIZE_MB
        value: "100"
      - key: INITIAL_SUPER_ADMIN_EMAIL
        sync: false
      - key: INITIAL_SUPER_ADMIN_PASSWORD
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: SMTP_USE_TLS
        value: "true"
      - key: FELLOH_API_BASE_URL
        value: https://api.felloh.com
      - key: FELLOH_PUBLIC_KEY
        sync: false
      - key: FELLOH_PRIVATE_KEY
        sync: false
      - key: FELLOH_ORGANISATION_ID
        sync: false
      - key: TRAVELTEK_API_BASE_URL
        value: https://fusionapi.traveltek.net/0.9/interface.pl
      - key: TRAVELTEK_USERNAME
        sync: false
      - key: TRAVELTEK_PASSWORD
        sync: false
      - key: TRAVELTEK_SITENAME
        sync: false
      - key: TRAVELTEK_MAX_CALLS_PER_RUN
        value: "25"

  - type: web
    name: head-office-reporting
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: "22.12.0"
      - key: VITE_API_BASE_URL
        value: https://head-office-reporting-api.onrender.com

  - type: cron
    name: head-office-weekly-email
    runtime: python
    plan: starter
    region: frankfurt
    schedule: "0 8 * * 1"
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && python -m app.jobs.send_weekly_email
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: head-office-reporting-db
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: SMTP_USE_TLS
        value: "true"

databases:
  - name: head-office-reporting-db
    databaseName: head_office_reporting
    user: head_office_reporting_user
    region: frankfurt
    plan: basic-1gb
